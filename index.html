<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ASİLKAN Custom | Atölye Tasarım Stüdyosu</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #b38e5d;
      --dark: #121212;
      --light: #f4f1ee;
      --white: #ffffff;
      --border: #e2ddd9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

    /* --- NAV --- */
    nav { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: #fff; position: sticky; top: 0; z-index: 100; }
    .logo { height: 50px; }

    /* --- TASARIM STÜDYOSU (KONFİGÜRATÖR) --- */
    .studio-container {
      display: grid;
      grid-template-columns: 1fr 400px;
      height: calc(100vh - 80px);
      background: var(--light);
    }

    /* Sol Panel: Önizleme */
    .preview-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: hidden;
    }
    .preview-panel h2 { position: absolute; top: 30px; left: 40px; font-family: 'Playfair Display'; font-style: italic; z-index: 5; }
    
    .model-wrapper { position: relative; width: 100%; max-width: 500px; transition: 0.5s; }
    
    /* Katmanlı Model Yapısı */
    #base-model { width: 100%; display: block; z-index: 1; }
    #pattern-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; mix-blend-mode: multiply; pointer-events: none;
      opacity: 0.85; transition: 0.3s;
      mask-image: url('https://i.imgur.com/uRovA7x.png'); /* Buraya ceketin kesim maskesi gelecek */
      -webkit-mask-image: url('https://i.imgur.com/uRovA7x.png'); 
      -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat;
    }

    /* Sağ Panel: Seçenekler */
    .options-panel {
      background: var(--white);
      border-left: 1px solid var(--border);
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      overflow-y: auto;
    }

    .option-group h4 { text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 15px; color: var(--gold); }
    
    /* Desen Seçici */
    .pattern-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pattern-item {
      aspect-ratio: 1; border: 2px solid transparent; cursor: pointer;
      overflow: hidden; border-radius: 4px; transition: 0.3s;
    }
    .pattern-item img { width: 100%; height: 100%; object-fit: cover; }
    .pattern-item.active { border-color: var(--gold); transform: scale(0.95); }

    /* Model Seçici */
    .type-select { display: flex; gap: 10px; }
    .type-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .type-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

    .summary { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
    .finish-btn {
      width: 100%; padding: 20px; background: #25D366; color: white; border: none;
      border-radius: 4px; font-weight: 600; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
    }
    .finish-btn:hover { background: #1ebe57; transform: translateY(-3px); }

    /* --- MOBIL --- */
    @media (max-width: 900px) {
      .studio-container { grid-template-columns: 1fr; height: auto; }
      .preview-panel { height: 400px; padding: 20px; }
      .options-panel { height: auto; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <nav>
    <img src="https://i.imgur.com/14VgsWh.png" class="logo" alt="Asilkan Logo">
  </nav>

  <div class="studio-container">
    
    <div class="preview-panel">
      <h2>Asilkan Studio</h2>
      <div class="model-wrapper">
        <img id="base-model" src="https://i.imgur.com/vJCJwvC.jpeg" alt="Model">
        <div id="pattern-overlay"></div>
      </div>
    </div>

    <div class="options-panel">
      
      <div class="option-group">
        <h4>1. Model Seçimi</h4>
        <div class="type-select">
          <button class="type-btn active" onclick="changeModel('ceket', 'https://i.imgur.com/vJCJwvC.jpeg')">Ceket</button>
          <button class="type-btn" onclick="changeModel('canta', 'https://i.imgur.com/e4acKJp.jpeg')">Çanta</button>
        </div>
      </div>

      <div class="option-group">
        <h4>2. Mevcut Halı Desenlerini Seç</h4>
        <div class="pattern-grid" id="patternGrid">
          <div class="pattern-item active" onclick="applyPattern('https://i.imgur.com/FlNkiBA.jpeg', 'Desen: Klasik Kırmızı')">
            <img src="https://i.imgur.com/FlNkiBA.jpeg">
          </div>
          <div class="pattern-item" onclick="applyPattern('https://i.imgur.com/a0asIvM.jpeg', 'Desen: Toprak Etnik')">
            <img src="https://i.imgur.com/a0asIvM.jpeg">
          </div>
          <div class="pattern-item" onclick="applyPattern('https://i.imgur.com/q31WvP8.jpeg', 'Desen: Vintage Mavi')">
            <img src="https://i.imgur.com/q31WvP8.jpeg">
          </div>
          <div class="pattern-item" onclick="applyPattern('https://i.imgur.com/j3AV7k2.jpeg', 'Desen: Anadolu Motif')">
            <img src="https://i.imgur.com/j3AV7k2.jpeg">
          </div>
          <div class="pattern-item" onclick="applyPattern('https://i.imgur.com/14sC9n8.jpeg', 'Desen: Geometrik')">
            <img src="https://i.imgur.com/14sC9n8.jpeg">
          </div>
        </div>
      </div>

      <div class="summary">
        <p style="font-size: 0.75rem; margin-bottom: 10px;">Seçilen Model: <strong id="selectedModelName">Ceket</strong></p>
        <p style="font-size: 0.75rem; margin-bottom: 20px;">Seçilen Desen: <strong id="selectedPatternName">Klasik Kırmızı</strong></p>
        
        <button onclick="sendOrder()" class="finish-btn">
          TASARIMI WHATSAPP İLE GÖNDER
        </button>
      </div>

    </div>
  </div>

  <script>
    let currentModel = "Ceket";
    let currentPattern = "Klasik Kırmızı";

    // Desen Uygulama Fonksiyonu
    function applyPattern(imgSrc, name) {
      const overlay = document.getElementById('pattern-overlay');
      overlay.style.backgroundImage = `url('${imgSrc}')`;
      overlay.style.backgroundSize = "cover";
      overlay.style.opacity = "0.7"; // Modelin gölgelerinin görünmesi için
      
      currentPattern = name;
      document.getElementById('selectedPatternName').innerText = name;

      // Aktif sınıfını güncelle
      document.querySelectorAll('.pattern-item').forEach(item => item.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // Model Değiştirme
    function changeModel(type, modelImg) {
      document.getElementById('base-model').src = modelImg;
      currentModel = type.toUpperCase();
      document.getElementById('selectedModelName').innerText = currentModel;

      document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    // WhatsApp'a Siparişi İletme
    function sendOrder() {
      const text = `Merhaba Asilkan Custom! Stüdyoda kendi tasarımımı yaptım:%0A%0AModel: ${currentModel}%0ASeçtiğim Desen: ${currentPattern}%0A%0AÜretim ve fiyat için bilgi alabilir miyim?`;
      const wpUrl = `https://wa.me/905454388096?text=${text}`;
      window.open(wpUrl, '_blank');
    }

    // İlk açılışta deseni yükle
    window.onload = () => {
        applyPattern('https://i.imgur.com/FlNkiBA.jpeg', 'Klasik Kırmızı');
    }
  </script>
</body>
</html>
